<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acerca de Travitrade</title>
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Archivos CSS -->
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/components.css">
    <link rel="stylesheet" href="/styles/responsive.css">
</head>
<body style="background-color: #0a1a0f;">
    
    <!-- Contenedor del Navbar dinámico -->
    <div id="navbar-container"></div>

    <main class="main-content" style="min-height: 80vh; padding: 6rem 2rem 4rem 2rem;">
        <div class="container text-center">
            <h1 style="color: #1D9E75; margin-bottom: 2rem;">Acerca de Travitrade</h1>
            
            <p style="max-width: 800px; margin: 0 auto 4rem auto; font-size: 1.2rem; color: var(--text-muted); line-height: 1.8;">
                Travitrade nace para darle a los traders las herramientas que necesitan para operar con claridad, registrar su progreso y dominar sus finanzas.
            </p>

            <div class="products-grid" style="margin-bottom: 4rem;">
                <!-- Travi Journals -->
                <div class="product-card">
                    <div class="product-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    </div>
                    <div class="product-content">
                        <h3 class="product-title">Travi Journals</h3>
                    </div>
                </div>

                <!-- Travi Portafolio -->
                <div class="product-card">
                    <div class="product-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
                    </div>
                    <div class="product-content">
                        <h3 class="product-title">Travi Portafolio</h3>
                    </div>
                </div>

                <!-- Travi Finance -->
                <div class="product-card">
                    <div class="product-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    </div>
                    <div class="product-content">
                        <h3 class="product-title">Travi Finance</h3>
                    </div>
                </div>
            </div>

            <a href="/index.html" class="btn btn-outline">&larr; Volver al inicio</a>
        </div>
    </main>

    <!-- Footer Dinámico -->
    <div id="footer-container"></div>

    <!-- JS Scripts -->
    <script src="/js/main.js"></script>
</body>
</html>
